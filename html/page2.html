<!DOCTYPE html>
<html lang="vi">
<head>
    
    <title>Thiết kế form</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="../CSS/style2.css">
</head>
<body>

<div class="container">

    <form id = "frmLogin">
        <h3 class = "title"> Đăng nhập hệ thống </h3>
    <div class="form-Group">
         <label for="txtUsername">Tên đăng nhập: </label>
         <input class="form-control" type="text" id ="txtUsername" name="txtUsername" placeholder="Nhập tên của bạn">
    </div>
    <div class="form-Group">
         <label for="txtPassword">Mật khẩu: </label>
         <input class="form-control" type="password" id ="txtPassword" name="txtPassword" placeholder="Nhập mật khẩu">
    </div>
        <input class="button" type="submit" name="sbLogin" value="Đăng nhập">
        <input class="button" type="reset" name="rsCancel" value="Hủy bỏ">
        </form>
</div>   

</body>
</html>
