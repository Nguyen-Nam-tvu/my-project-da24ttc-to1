<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Đăng ký lập trình web</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../CSS/style3.css">
</head>
<body>

<div class="container">
    <h1>ĐĂNG KÝ LẬP TRÌNH WEB</h1>
    <form>

    
    <div class="form-group row">
      <div class="field">
        <label>Họ tên:</label>
        <input type="text" placeholder="Nhập họ tên">
      </div>
      <div class="field">
        <label>MSSV:</label>
        <input type="text" placeholder="Nhập MSSV">
      </div>
    </div>

    
    <div class="form-group">
        <label>Giới tính:</label>
        <input type="radio" name="gender"> Nam
        <input type="radio" name="gender"> Nữ

        <label>Lớp:</label>
        <select>
            <option>-- Chọn lớp --</option>
            <option>DA24TTA</option>
            <option>DA24TTB</option>
            <option>DA24TTC</option>
            <option>DA24TTD</option>
        </select>
    </div>

    
    <div class="form-group">
        <label>Ngày sinh:</label>
        <input type="date">
    </div>

    
    <div class="form-group">
        <label>Số điện thoại:</label>
        <input type="tel" placeholder="Nhập số điện thoại">
    </div>

    
    <div class="form-group">
        <label>Địa chỉ:</label>
        <input type="text" placeholder="Nhập địa chỉ" style="width: 100%;">
    </div>

    
    <div class="form-group">
        <label>Điểm mạnh:</label>
        <br>
        <input type="checkbox"> Chuyên về lập trình giao diện HTML
        <br>
        <input type="checkbox"> Chuyên về định dạng bố cục, tạo hiệu ứng CSS
        <br>
        <input type="checkbox"> Chuyên thiết kế, xây dựng tương tác hiệu ứng động JavaScript
    </div>

    
    <div class="form-group">
        <label>Hình ảnh:</label>
        <input type="file">
    </div>

    
    <div class="form-group">
        <label>Email:</label>
        <input type="email" placeholder="Nhập email">
    </div>

    <div class="buttons">
        <button type="submit">Đăng ký</button>
        <button type="reset">Nhập lại</button>
    </div>

</form>
</div>

</body>
</html>
