<!DOCTYPE html>
<html lang="vi">
<head>
    
    <title>Bảng cửu chương</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="../CSS/style4.css">
</head>
<body>

<div class="container">

    <form id = "bangcuuchuong">
        <h2 class = "title"> In bảng cửu chương</h2>
    <div class="form">
         <label for="number">Nhập số:</label>
         <input type="number" id="number" placeholder="Nhập mật khẩu">
         <button type="button" onclick="inBCC()">In</button>
    </div>
        <div id="kq">
        </div>
    </form>
</div>
    <script>
    function inBCC(){
    const myfrm=document.forms["bangcuuchuong"];
    const mytextfield=myfrm.elements[0];
    let num= parseInt(document.getElementById("number").value);
    let kq="";
    for( let i=1; i<11 ;i++ )
    {
         
      kq+=num + " x "+ i +" = " + (num * i) + "<br>";
     

    }
    document.getElementById("kq").innerHTML=kq;
    }

    </script>

  

</body>
